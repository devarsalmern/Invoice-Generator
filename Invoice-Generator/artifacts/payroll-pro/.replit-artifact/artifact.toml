kind = "web"
previewPath = "/"
title = "PayrollPro"
version = "1.0.0"
id = "artifacts/payroll-pro"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25275

[services.development]
run = "pnpm --filter @workspace/payroll-pro run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/payroll-pro", "run", "build" ]
publicDir = "artifacts/payroll-pro/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25275"
BASE_PATH = "/"
