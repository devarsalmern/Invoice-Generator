[phases.setup]
nixPkgs = ["nodejs_18"]

[phases.install]
cmds = [
  "corepack enable",
  "corepack prepare pnpm@10.17.1 --activate",
  "pnpm install --frozen-lockfile"
]

[phases.build]
cmds = [
  "pnpm --filter @workspace/api-server run build"
]

[start]
cmd = "pnpm --filter @workspace/api-server run start"