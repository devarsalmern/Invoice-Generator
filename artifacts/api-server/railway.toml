[build]
builder      = "nixpacks"
buildCommand = "cd ../.. && corepack enable && corepack prepare pnpm@10.17.1 --activate && pnpm install --frozen-lockfile && pnpm --filter @workspace/api-server run build"

[deploy]
startCommand = "cd ../.. && pnpm --filter @workspace/api-server run start"
healthcheckPath = "/api/healthz"
restartPolicyType = "on_failure"
