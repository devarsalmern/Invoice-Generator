[build]
builder = "nixpacks"
buildCommand = "corepack enable && corepack prepare pnpm@10.17.1 --activate && pnpm install --frozen-lockfile && pnpm --filter @workspace/api-server run build"

[deploy]
startCommand = "pnpm --filter @workspace/api-server run start"
healthcheckPath = "/api/healthz"
restartPolicyType = "on_failure"